services:
  # --- Cloudflare Tunnel : acces TCP au SMSC via la machine locale ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: >
      access tcp
      --hostname ${CF_TUNNEL_HOSTNAME}
      --url 0.0.0.0:2775
      --id ${CF_ACCESS_CLIENT_ID}
      --secret ${CF_ACCESS_CLIENT_SECRET}

  # --- Redis : file d'attente BullMQ ---
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # --- SMPP Bridge : session SMPP + workers BullMQ ---
  smpp-bridge:
    build:
      context: .
      dockerfile: smpp-bridge/Dockerfile
    env_file:
      - smpp-bridge/.env
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      redis:
        condition: service_healthy
      cloudflared:
        condition: service_started
    restart: unless-stopped

volumes:
  redis-data:
